<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - CAPA Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .landing-card {
            background: white;
            border-radius: 20px;
            padding: 60px 50px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
        }
        .landing-icon {
            font-size: 80px;
            color: #667eea;
            margin-bottom: 20px;
        }
        .landing-title {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .landing-subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 16px;
        }
        .btn-custom {
            padding: 12px 40px;
            font-size: 16px;
            border-radius: 30px;
            margin: 5px;
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
        }
        .btn-login:hover {
            opacity: 0.9;
            color: white;
        }
        .btn-register {
            border: 2px solid #667eea;
            color: #667eea;
            background: white;
        }
        .btn-register:hover {
            background: #667eea;
            color: white;
        }
        .features {
            margin-top: 30px;
            text-align: left;
        }
        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            color: #555;
        }
        .feature-item i {
            color: #667eea;
            margin-right: 10px;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="landing-card">
        <div class="landing-icon"><i class="bi bi-shield-check"></i></div>
        <div class="landing-title">CAPA Management</div>
        <div class="landing-subtitle">Corrective and Preventive Action Tracking System</div>
        
        <div class="d-flex justify-content-center gap-3">
            <a href="{{ url_for('login') }}" class="btn btn-custom btn-login">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </a>
            <a href="{{ url_for('register') }}" class="btn btn-custom btn-register">
                <i class="bi bi-person-plus"></i> Register
            </a>
        </div>

        <div class="features">
            <div class="feature-item">
                <i class="bi bi-check-circle-fill"></i>
                <span>Track corrective and preventive actions</span>
            </div>
            <div class="feature-item">
                <i class="bi bi-paperclip"></i>
                <span>Attach evidence and documentation</span>
            </div>
            <div class="feature-item">
                <i class="bi bi-file-pdf"></i>
                <span>Generate PDF reports instantly</span>
            </div>
            <div class="feature-item">
                <i class="bi bi-graph-up"></i>
                <span>Monitor progress and compliance</span>
            </div>
        </div>
    </div>
</body>
</html>
